[entity-description]
hps__fo-optical-connector=Verbindet mit Glasfasern die in allen Stromkabeln sind. Kann rote und grüne Signale über das Stromnetz übertragen.
hps__fo-oc-io_pin_one=Verbindet rote und grüne Signale mit dem Glasfasernetzwerk.
hps__fo-oc-io_pin=Verbindet rote und grüne Signale mit dem Glasfasernetzwerk.
hps__fo-oc-power-pole=Anschlußpunkt für ein Kupferkabel um auf die Glasfasern zuzugreifen.
hps__fo-power-interface=Versorgt den Glasfaserverbinder mit Strom.
hps__fo-led=Zeigt die Verbindung mit dem Glasfasernetzwerk an. Leuchtet, wenn die Verbindung stabil ist. Grün bedeutet daß der Verbinder Daten überträgt, bei rot ist der Verbinder deaktiviert.
hps__fo-controller=Steuert die Verbindungen mit dem Glasfasernetzwerk.
hps__fo-fiber-hub=Zentraler Verteilungspunkt für eine einzele Farbe. Überträgt die roten und grünen Signale.

